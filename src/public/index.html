<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #4285f4;
        --success-bg: #0d2818;
        --success-border: #1f5c3a;
        --success-text: #7dffb3;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --surface: #fff;
          --border: #dadce0;
          --text: #202124;
          --muted: #5f6368;
          --success-bg: #e6f4ea;
          --success-border: #34a853;
          --success-text: #137333;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            rgba(66, 133, 244, 0.15),
            transparent
          ),
          var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 36px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p.sub {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.5;
      }
      .banner {
        display: none;
        margin-bottom: 24px;
        padding: 14px 16px;
        border-radius: 10px;
        font-size: 0.9375rem;
        line-height: 1.45;
        border: 1px solid var(--success-border);
        background: var(--success-bg);
        color: var(--success-text);
      }
      .banner.visible {
        display: block;
      }
      .banner.error {
        border-color: #c5221f;
        background: rgba(197, 34, 31, 0.12);
        color: #ea4335;
      }
      @media (prefers-color-scheme: light) {
        .banner.error {
          background: #fce8e6;
          color: #c5221f;
        }
      }
      a.google {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 12px 20px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.9375rem;
        font-weight: 500;
        text-decoration: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s,
          transform 0.1s;
      }
      a.google:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 14px rgba(66, 133, 244, 0.2);
      }
      a.google:active {
        transform: scale(0.98);
      }
      .g-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .signed-as {
        margin-top: 20px;
        font-size: 0.8125rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="banner" class="banner" role="status"></div>
      <h1>Welcome</h1>
      <p class="sub">Sign in with your Google account to continue.</p>
      <a class="google" href="/auth/google">
        <svg class="g-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          />
        </svg>
        Continue with Google
      </a>
      <p id="signedAs" class="signed-as" hidden></p>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var login = params.get('login');
        var banner = document.getElementById('banner');
        var signedAs = document.getElementById('signedAs');
        if (login === 'success') {
          banner.textContent = 'Logged in successfully.';
          banner.classList.add('visible');
          try {
            var user = JSON.parse(sessionStorage.getItem('user') || 'null');
            if (user && user.email) {
              signedAs.textContent = 'Signed in as ' + user.email;
              signedAs.hidden = false;
            }
          } catch (_) {}
          window.history.replaceState({}, '', '/');
        } else if (login === 'error') {
          banner.textContent = 'Sign-in did not complete. Please try again.';
          banner.classList.add('visible', 'error');
          window.history.replaceState({}, '', '/');
        }
      })();
    </script>
  </body>
</html>
